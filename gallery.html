<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真集 ─ 三昌プロダクション</title>
<meta name="description" content="三遊亭円左衛門の高座写真集。白河から落語のモンスターを。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-hi: #8B0A1A;
    --color-edo: #1A2840;
    --color-base: #F5F0E8;
    --color-base-deep: #EDE5D5;
    --color-sumi-light: #555555;
    --serif: "Noto Serif JP", serif;
    --sans: "Noto Sans JP", sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--color-base);
    color: var(--color-edo);
    line-height: 1.8;
  }

  header {
    background: rgba(245, 240, 232, 0.95);
    backdrop-filter: blur(12px);
    padding: 20px 32px;
    border-bottom: 1px solid rgba(26, 40, 64, 0.08);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .back-link {
    font-family: var(--serif);
    color: var(--color-edo);
    text-decoration: none;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.2s;
  }

  .back-link:hover { color: var(--color-hi); }

  .page-title {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 60px 32px;
  }

  .gallery-header {
    text-align: center;
    margin-bottom: 60px;
  }

  .gallery-header h1 {
    font-family: var(--serif);
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 900;
    color: var(--color-hi);
    margin-bottom: 16px;
    letter-spacing: 0.1em;
  }

  .gallery-header p {
    font-family: var(--serif);
    color: var(--color-sumi-light);
    font-size: 15px;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(26, 40, 64, 0.1);
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .gallery-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(26, 40, 64, 0.15);
  }

  .gallery-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.5s;
  }

  .gallery-item:hover img {
    transform: scale(1.05);
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 40, 64, 0.95);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  .lightbox.active {
    display: flex;
  }

  .lightbox img {
    max-width: 100%;
    max-height: 90vh;
    object-fit: contain;
    border-radius: 4px;
  }

  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 24px;
    background: none;
    border: none;
    color: var(--color-base);
    font-size: 32px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .lightbox-close:hover { opacity: 1; }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--color-base);
    font-size: 48px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    padding: 20px;
  }

  .lightbox-nav:hover { opacity: 1; }
  .lightbox-prev { left: 20px; }
  .lightbox-next { right: 20px; }

  footer {
    background: #1A1A1A;
    color: var(--color-base);
    padding: 40px 32px;
    text-align: center;
    font-family: var(--serif);
    font-size: 12px;
    opacity: 0.7;
  }

  @media (max-width: 600px) {
    .gallery-grid {
      grid-template-columns: 1fr;
    }
    .lightbox-nav { font-size: 32px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="back-link">← 戻る</a>
    <span class="page-title">三昌プロダクション</span>
  </div>
</header>

<main>
  <div class="gallery-header">
    <h1>写真集</h1>
    <p>三遊亭円左衛門　高座の記録</p>
  </div>

  <div class="gallery-grid">
    <div class="gallery-item"><img src="images/S__46956549_0.jpg" alt="高座写真 1"></div>
    <div class="gallery-item"><img src="images/S__46956550_0.jpg" alt="高座写真 2"></div>
    <div class="gallery-item"><img src="images/S__46956551_0.jpg" alt="高座写真 3"></div>
    <div class="gallery-item"><img src="images/S__46956552_0.jpg" alt="高座写真 4"></div>
    <div class="gallery-item"><img src="images/S__46956553_0.jpg" alt="高座写真 5"></div>
    <div class="gallery-item"><img src="images/S__46956554_0.jpg" alt="高座写真 6"></div>
    <div class="gallery-item"><img src="images/S__46956555_0.jpg" alt="高座写真 7"></div>
    <div class="gallery-item"><img src="images/S__46956556_0.jpg" alt="高座写真 8"></div>
    <div class="gallery-item"><img src="images/S__46956557_0.jpg" alt="高座写真 9"></div>
  </div>
</main>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <button class="lightbox-nav lightbox-prev" onclick="prevImage()">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button class="lightbox-nav lightbox-next" onclick="nextImage()">›</button>
</div>

<footer>
  © 2026 三昌プロダクション
</footer>

<script>
const images = [
  'images/S__46956549_0.jpg',
  'images/S__46956550_0.jpg',
  'images/S__46956551_0.jpg',
  'images/S__46956552_0.jpg',
  'images/S__46956553_0.jpg',
  'images/S__46956554_0.jpg',
  'images/S__46956555_0.jpg',
  'images/S__46956556_0.jpg',
  'images/S__46956557_0.jpg'
];

let currentIndex = 0;

document.querySelectorAll('.gallery-item').forEach((item, index) => {
  item.addEventListener('click', () => {
    currentIndex = index;
    openLightbox();
  });
});

function openLightbox() {
  document.getElementById('lightbox').classList.add('active');
  document.getElementById('lightbox-img').src = images[currentIndex];
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function prevImage() {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  document.getElementById('lightbox-img').src = images[currentIndex];
}

function nextImage() {
  currentIndex = (currentIndex + 1) % images.length;
  document.getElementById('lightbox-img').src = images[currentIndex];
}

document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target.id === 'lightbox') closeLightbox();
});

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') prevImage();
  if (e.key === 'ArrowRight') nextImage();
});
</script>
</body>
</html>
